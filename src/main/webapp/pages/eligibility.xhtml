<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Eligibility</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
</h:head>
<h:body>
    <div class="layout">
        <div class="header">
            <div class="title">Eligibility Breakdown</div>
            <div class="nav"><a href="#{request.contextPath}/pages/dashboard.xhtml">Dashboard</a></div>
        </div>
        <div class="table-wrapper">
            <h:dataTable value="#{studentBean.eligibilityResults}" var="result" styleClass="table">
                <h:column><f:facet name="header">Student No</f:facet>#{result.studentNumber}</h:column>
                <h:column><f:facet name="header">Name</f:facet>#{result.studentName}</h:column>
                <h:column><f:facet name="header">CGPA</f:facet>#{result.cgpa}</h:column>
                <h:column><f:facet name="header">Failed Courses</f:facet>#{result.failedCourseCount}</h:column>
                <h:column><f:facet name="header">Eligible</f:facet>#{result.eligible ? 'Yes' : 'No'}</h:column>
                <h:column><f:facet name="header">Reason</f:facet>#{result.reason}</h:column>
            </h:dataTable>
        </div>
    </div>
</h:body>
</html>

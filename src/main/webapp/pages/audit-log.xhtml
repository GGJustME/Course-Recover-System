<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Audit Log</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/css/styles.css" />
</h:head>
<h:body>
    <div class="layout">
        <div class="header">
            <div class="title">Audit Log</div>
            <div class="nav"><h:outputLink value="#{request.contextPath}/pages/dashboard.xhtml">Dashboard</h:outputLink></div>
        </div>
        
        <h:form id="auditForm">
            <div class="table-wrapper">
                <p:dataTable value="#{auditLogBean.auditLogs}" var="log" 
                             paginator="true" rows="15" 
                             paginatorPosition="bottom"
                             styleClass="table" stripedRows="true">
                    
                    <p:column headerText="Actor" sortBy="#{log.actorUsername}" filterBy="#{log.actorUsername}" filterMatchMode="contains">
                        <h:outputText value="#{log.actorUsername}" />
                    </p:column>
                    
                    <p:column headerText="Action" sortBy="#{log.actionType}">
                        <h:outputText value="#{log.actionType}" />
                    </p:column>
                    
                    <p:column headerText="Entity">
                        <h:outputText value="#{log.entityName}" />
                    </p:column>
                    
                    <p:column headerText="Details">
                        <h:outputText value="#{log.details}" />
                    </p:column>
                    
                    <p:column headerText="Timestamp" sortBy="#{log.createdAt}">
                        <h:outputText value="#{log.createdAt}" />
                    </p:column>
                </p:dataTable>
            </div>
        </h:form>
    </div>
</h:body>
</html>
